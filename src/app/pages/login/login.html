<div class="login-container">
    <div class="background-circles">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
        <div class="circle circle-4"></div>
        <div class="circle circle-5"></div>
        <div class="circle circle-6"></div>
        <div class="circle circle-7"></div>
        <div class="circle circle-8"></div>
        <div class="circle circle-9"></div>
        <div class="circle circle-10"></div>
    </div>

    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="col-11 col-sm-8 col-md-5 col-lg-4">
            
            <div class="card login-card animate__animated animate__fadeInUp">
                
                <div class="text-center mt-4">
                    <!-- <div class="logo-wrapper">
                        <img src="assets/images/quizify.png" alt="Quizify Logo" class="logo">
                    </div> -->
                    <h2 class="brand mt-2">Quizify</h2>
                    <p class="tagline text-muted">
                        <i class="bi bi-stars me-1"></i>
                        Défie ton intelligence
                    </p>
                </div>

                <div class="card-body px-4">
                    <form>
                        <div class="mb-4">
                            <label class="form-label custom-label">Nom d'utilisateur</label>
                            <div class="input-group custom-input-group">
                                <span class="input-group-text border-0 bg-transparent">
                                    <i class="bi bi-person-circle"></i>
                                </span>
                                <input type="text" class="form-control" 
                                       placeholder="Ton pseudo..." [(ngModel)]="username" name="username" required>
                            </div>
                        </div>

                        <div class="text-end mb-4">
                            <a href="/forgot" class="forgot-link text-decoration-none">
                                Pseudo oublié ?
                            </a>
                        </div>

                        <button class="btn btn-login w-100 mb-4" [disabled]="!username || loading" (click)="login()">
                            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                            <span *ngIf="!loading">Prêt à jouer ? <i class="bi bi-rocket-takeoff-fill ms-2"></i></span>
                        </button>
                    </form>
                </div>

                <div class="card-footer bg-transparent border-0 text-center pb-4">
                    <p class="mb-0 text-muted">
                        Nouveau ici ? 
                        <a href="/register" class="register-link fw-bold ms-1">Créer un compte</a>
                    </p>
                </div>

            </div>
        </div>
    </div>
</div>
