<div class="notifications-container">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-end mb-4">
                    <div>
                        <h2 class="fw-bold">Centre d'activités</h2>
                        <p class="text-white-50">3 notifications non lues</p>
                    </div>
                    <button class="btn-clear-all">Tout marquer comme lu</button>
                </div>

                <div class="notification-list-glass animate__animated animate__fadeInUp">

                    <h6 class="group-title">Nouveaux Défis</h6>
                    <div class="notif-card" *ngFor="let notif of notifications">
                        <div class="notif-icon" [ngClass]="notif.type">
                            <i class="bi" [ngClass]="notif.icon"></i>
                        </div>
                        <div class="notif-content">
                            <p class="mb-1">{{ notif.message }}</p>
                            <span class="notif-date">{{ notif.time }}</span>
                        </div>
                        <button class="btn-action-small" *ngIf="notif.canAccept">Accepter</button>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
