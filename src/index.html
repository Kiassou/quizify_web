<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <title>Quizify | Défie ton intelligence</title>
  <base href="/quizify_web/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

  <link rel="apple-touch-icon" sizes="180x180" href="./assets/quizify.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/quizify.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/quizify.png">
  <link rel="manifest" href="/assets/site.webmanifest">

  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      overflow: hidden;
    }

    @keyframes gradient {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    .loader-card {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 3rem;
      border-radius: 30px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
      max-width: 400px;
    }

    .quizify-logo-loader {
      font-size: 4rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.5));
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.1);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 0.8;
      }
    }

    .brand-name {
      font-weight: 700;
      font-size: 2.5rem;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }

    .loader-text {
      font-weight: 300;
      font-size: 1rem;
      opacity: 0.9;
      margin-bottom: 2rem;
    }

    .custom-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <app-root>
    <div class="app-loading">
      <div class="loader-card animate__animated animate__zoomIn">
        <div class="quizify-logo-loader">
          <i class="bi bi-rocket-takeoff-fill"></i>
        </div>
        <h1 class="brand-name">Quizify</h1>
        <p class="loader-text">
          Prépare-toi à défier tes limites. <br>
          Le monde de l'intelligence t'attend...
        </p>
        <div class="d-flex justify-content-center">
          <div class="custom-spinner"></div>
        </div>
      </div>
    </div>
  </app-root>
</body>

</html>
